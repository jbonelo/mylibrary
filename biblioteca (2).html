<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biblioteca</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #f5f2eb;
    --ink: #1a1a1a;
    --accent: #c0392b;
    --muted: #7a7265;
    --line: #d4cfc6;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'EB Garamond', serif;
    font-size: 15px;
    padding: 40px 32px;
    max-width: 1100px;
    margin: 0 auto;
  }

  header {
    border-bottom: 2px solid var(--ink);
    padding-bottom: 16px;
    margin-bottom: 28px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  header h1 {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
  }

  header .count {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.1em;
  }

  .controls {
    display: flex;
    gap: 10px;
    margin-bottom: 12px;
    flex-wrap: wrap;
    align-items: center;
  }

  .controls input {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    padding: 7px 12px;
    border: 1px solid var(--line);
    background: white;
    color: var(--ink);
    outline: none;
    width: 220px;
    letter-spacing: 0.05em;
  }

  .controls input:focus { border-color: var(--ink); }

  .filter-btn {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    padding: 7px 12px;
    border: 1px solid var(--line);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: all 0.15s;
  }

  .filter-btn:hover, .filter-btn.active {
    background: var(--ink);
    color: var(--bg);
    border-color: var(--ink);
  }

  .filter-btn.active { color: #f5c842; }

  .filter-row {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    align-items: center;
  }

  .filter-label {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding-right: 4px;
  }

  .val-btn {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    padding: 5px 10px;
    border: 1px solid var(--line);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .val-btn:hover, .val-btn.active {
    background: var(--ink);
    color: #f5c842;
    border-color: var(--ink);
  }

  table { width: 100%; border-collapse: collapse; }

  thead tr { border-bottom: 1px solid var(--ink); }

  th {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 8px 12px 8px 0;
    text-align: left;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }

  th:hover { color: var(--ink); }
  th.sort-asc::after { content: ' ↑'; color: var(--accent); }
  th.sort-desc::after { content: ' ↓'; color: var(--accent); }

  td {
    padding: 9px 12px 9px 0;
    border-bottom: 1px solid var(--line);
    vertical-align: top;
    line-height: 1.4;
  }

  tr:hover td { background: rgba(0,0,0,0.02); }
  td:first-child { font-style: italic; }

  td.author {
    font-style: normal;
    color: var(--muted);
    font-size: 14px;
  }

  td.year {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
  }

  td.year .uncertain { color: var(--accent); }

  td.val { font-size: 15px; white-space: nowrap; width: 32px; }

  .cat-badge {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 2px 7px;
    border: 1px solid currentColor;
    white-space: nowrap;
    display: inline-block;
  }

  .cat-historia { color: #8B4513; }
  .cat-economia { color: #1a6b3c; }
  .cat-psicologia { color: #2c5f8a; }
  .cat-filosofia { color: #6b3d8a; }
  .cat-geopolitica { color: #c0392b; }
  .cat-literatura { color: #b5651d; }
  .cat-otros { color: #555; }

  .no-results {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    padding: 40px 0;
    text-align: center;
    display: none;
  }

  .footnote {
    margin-top: 32px;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.05em;
    border-top: 1px solid var(--line);
    padding-top: 12px;
  }
</style>
</head>
<body>

<header>
  <h1>Biblioteca — Inventario</h1>
  <span class="count" id="counter"></span>
</header>

<div class="controls">
  <input type="text" id="search" placeholder="Buscar título, autor..." oninput="applyFilters()">
  <button class="filter-btn active" data-cat="all" onclick="setCatFilter('all', this)">Todos</button>
  <button class="filter-btn" data-cat="historia/biografia" onclick="setCatFilter('historia/biografia', this)">Historia/Biog.</button>
  <button class="filter-btn" data-cat="economia" onclick="setCatFilter('economia', this)">Economía</button>
  <button class="filter-btn" data-cat="psicologia" onclick="setCatFilter('psicologia', this)">Psicología</button>
  <button class="filter-btn" data-cat="filosofia/ensayo" onclick="setCatFilter('filosofia/ensayo', this)">Filosofía/Ensayo</button>
  <button class="filter-btn" data-cat="geopolitica/global affairs" onclick="setCatFilter('geopolitica/global affairs', this)">Geopolítica</button>
  <button class="filter-btn" data-cat="otros" onclick="setCatFilter('otros', this)">Otros</button>
</div>

<div class="filter-row">
  <span class="filter-label">Valoración:</span>
  <button class="val-btn active" data-val="all" onclick="setValFilter('all', this)">Todos</button>
  <button class="val-btn" data-val="3" onclick="setValFilter('3', this)">★ Obra maestra</button>
  <button class="val-btn" data-val="2" onclick="setValFilter('2', this)">◆ Imprescindible</button>
  <button class="val-btn" data-val="1" onclick="setValFilter('1', this)">● Bueno</button>
  <button class="val-btn" data-val="0" onclick="setValFilter('0', this)">○ Indiferente</button>
  <button class="val-btn" data-val="000" onclick="setValFilter('000', this)">— No leído</button>
</div>

<table id="bookTable">
  <thead>
    <tr>
      <th onclick="sortTable('title')">Título</th>
      <th onclick="sortTable('author')">Autor</th>
      <th onclick="sortTable('year')">Año</th>
      <th onclick="sortTable('cat')">Categoría</th>
      <th onclick="sortTable('val')">Val.</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>

<div class="no-results" id="noResults">Sin resultados.</div>

<div class="footnote">★ Obra maestra &nbsp;|&nbsp; ◆ Imprescindible &nbsp;|&nbsp; ● Bueno &nbsp;|&nbsp; ○ Indiferente &nbsp;|&nbsp; — No leído &nbsp;|&nbsp; · Sin valorar &nbsp;|&nbsp; * año incierto &nbsp;|&nbsp; [?] título/autor parcial</div>

let currentCatFilter = 'all';
let currentValFilter = 'all';
let sortKey = null;
let sortDir = 1;

const valDisplay = {'3':'★','2':'◆','1':'●','0':'○','000':'—','?':'·'};
const valOrder = {'3':0,'2':1,'1':2,'0':3,'000':4,'?':5};

function catClass(cat) {
  const map = {'historia/biografia':'cat-historia','economia':'cat-economia','psicologia':'cat-psicologia','filosofia/ensayo':'cat-filosofia','geopolitica/global affairs':'cat-geopolitica','literatura':'cat-literatura','otros':'cat-otros'};
  return map[cat] || 'cat-otros';
}

function catLabel(cat) {
  const map = {'historia/biografia':'Historia/Biog.','economia':'Economía','psicologia':'Psicología','filosofia/ensayo':'Filosofía/Ensayo','geopolitica/global affairs':'Geopolítica','literatura':'Literatura','otros':'Otros'};
  return map[cat] || cat;
}

function setCatFilter(cat, btn) {
  currentCatFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function setValFilter(val, btn) {
  currentValFilter = val;
  document.querySelectorAll('.val-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function sortTable(key) {
  if (sortKey === key) sortDir *= -1;
  else { sortKey = key; sortDir = 1; }
  document.querySelectorAll('th').forEach(th => { th.classList.remove('sort-asc','sort-desc'); });
  const thMap = {title:0,author:1,year:2,cat:3,val:4};
  document.querySelectorAll('th')[thMap[key]].classList.add(sortDir === 1 ? 'sort-asc' : 'sort-desc');
  applyFilters();
}

function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase();
  let filtered = books.filter(b => {
    const matchCat = currentCatFilter === 'all' || b.cat === currentCatFilter;
    const matchVal = currentValFilter === 'all' || b.val === currentValFilter;
    const matchQ = !q || b.title.toLowerCase().includes(q) || b.author.toLowerCase().includes(q);
    return matchCat && matchVal && matchQ;
  });

  if (sortKey) {
    filtered.sort((a, b) => {
      let av = a[sortKey], bv = b[sortKey];
      if (sortKey === 'year') {
        av = av === '?' ? 9999 : Number(av);
        bv = bv === '?' ? 9999 : Number(bv);
        return (av - bv) * sortDir;
      }
      if (sortKey === 'val') return (valOrder[av] - valOrder[bv]) * sortDir;
      return String(av).localeCompare(String(bv)) * sortDir;
    });
  }

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  filtered.forEach(b => {
    const yearStr = b.year === '?' ? '<span class="uncertain">?</span>' : (b.year < 0 ? `${Math.abs(b.year)} a.C.` : b.year);
    tbody.innerHTML += `<tr>
      <td>${b.title}</td>
      <td class="author">${b.author}</td>
      <td class="year">${yearStr}</td>
      <td><span class="cat-badge ${catClass(b.cat)}">${catLabel(b.cat)}</span></td>
      <td class="val">${valDisplay[b.val] || '·'}</td>
    </tr>`;
  });

  document.getElementById('counter').textContent = `${filtered.length} / ${books.length} títulos`;
  document.getElementById('noResults').style.display = filtered.length === 0 ? 'block' : 'none';
}

applyFilters();
</script>
